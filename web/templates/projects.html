{% extends 'base.html' %}

{% block content %}

</div>

<div
    class="bg-dark-surface p-12 rounded-2xl border border-dark-border shadow-lg flex flex-col items-center justify-center text-center">
    <div class="w-16 h-16 bg-dark-bg rounded-full flex items-center justify-center mb-6">
        <svg class="w-8 h-8 text-dark-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
            </path>
        </svg>
    </div>

</div>
